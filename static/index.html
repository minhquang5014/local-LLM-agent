<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Local LLM Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ── Reset & Variables ─────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0f;
  --surface:#131316;
  --surface2:#1a1a1f;
  --surface3:#222228;
  --border:rgba(255,255,255,.07);
  --border2:rgba(255,255,255,.12);
  --text:#e2e2e8;
  --text-muted:#6b6b80;
  --text-dim:#9494a8;
  --accent:#7c6cf5;
  --accent2:#5b4de8;
  --accent-glow:rgba(124,108,245,.18);
  --user-bg:linear-gradient(135deg,#1c1e4a,#222660);
  --user-border:rgba(124,108,245,.35);
  --user-text:#dde4ff;
  --thought-border:#3a3a50;
  --tool-bg:#0c1a0f;
  --tool-border:#1a4020;
  --tool-text:#4ade80;
  --result-bg:#111115;
  --error-bg:#1a0c0c;
  --error-border:#4a1515;
  --radius:14px;
  --radius-sm:8px;
  --sidebar-w:260px;
  --transition:.18s ease;
}
/* ── Light theme ───────────────────────────────────────────────── */
:root.light{
  --bg:#f5f5f7;
  --surface:#ffffff;
  --surface2:#f0f0f5;
  --surface3:#e4e4ec;
  --border:rgba(0,0,0,.09);
  --border2:rgba(0,0,0,.14);
  --text:#1a1a2e;
  --text-muted:#6b6b80;
  --text-dim:#555568;
  --accent:#6c5ce7;
  --accent2:#4e3cc9;
  --accent-glow:rgba(108,92,231,.15);
  --user-bg:linear-gradient(135deg,#ede9fe,#ddd6fe);
  --user-border:rgba(108,92,231,.3);
  --user-text:#2d1b69;
  --thought-border:#c4c4d8;
  --tool-bg:#f0fdf4;
  --tool-border:#bbf7d0;
  --tool-text:#16a34a;
  --result-bg:#f8f8fc;
  --error-bg:#fff1f2;
  --error-border:#fecdd3;
}
/* theme toggle button */
#theme-btn{
  background:none;border:none;color:var(--text-muted);
  cursor:pointer;padding:4px 6px;border-radius:6px;font-size:17px;
  transition:color var(--transition),background var(--transition);
  line-height:1;
}
#theme-btn:hover{color:var(--text);background:var(--surface2)}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}

/* ── Layout ────────────────────────────────────────────────────── */
#app{display:flex;height:100vh;overflow:hidden}

/* ── Sidebar ───────────────────────────────────────────────────── */
#sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  padding:0;overflow:hidden;
  transition:width var(--transition),min-width var(--transition);
  z-index:10;
}
#sidebar.collapsed{width:0;min-width:0;border:none}

.sidebar-header{
  padding:18px 16px 14px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.logo-mark{
  width:32px;height:32px;border-radius:9px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
  box-shadow:0 2px 12px var(--accent-glow);
}
.logo-text{font-weight:600;font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden}
.logo-sub{font-size:11px;color:var(--text-muted);font-weight:400}

#new-chat-btn{
  margin:12px;
  padding:9px 14px;
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:var(--radius-sm);
  color:var(--text);
  font-size:13px;font-weight:500;
  cursor:pointer;display:flex;align-items:center;gap:8px;
  transition:background var(--transition),border-color var(--transition);
}
#new-chat-btn:hover{background:var(--surface3);border-color:rgba(255,255,255,.2)}
#new-chat-btn svg{opacity:.7}

.sidebar-section-label{
  padding:10px 16px 6px;
  font-size:11px;font-weight:600;letter-spacing:.06em;
  text-transform:uppercase;color:var(--text-muted);
}

#chat-list{flex:1;overflow-y:auto;padding:0 8px}
.chat-item{
  padding:9px 10px;border-radius:var(--radius-sm);
  cursor:pointer;display:flex;align-items:center;gap:8px;
  color:var(--text-dim);font-size:13px;
  transition:background var(--transition),color var(--transition);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:2px;
}
.chat-item:hover{background:var(--surface2);color:var(--text)}
.chat-item.active{background:var(--surface3);color:var(--text)}
.chat-item-icon{opacity:.5;flex-shrink:0}
.chat-item-title{overflow:hidden;text-overflow:ellipsis}

/* Memory panel */
.memory-panel{
  border-top:1px solid var(--border);
  padding:10px 8px 8px;
}
.memory-header{
  padding:4px 8px 8px;
  display:flex;align-items:center;justify-content:space-between;
}
.memory-title{
  font-size:11px;font-weight:600;letter-spacing:.06em;
  text-transform:uppercase;color:var(--text-muted);
  display:flex;align-items:center;gap:6px;
}
.memory-count{
  font-size:10px;background:var(--surface3);
  padding:1px 6px;border-radius:10px;color:var(--text-dim);
  font-weight:500;
}
#clear-memory-btn{
  font-size:11px;padding:3px 8px;border-radius:5px;
  background:transparent;border:1px solid var(--border2);
  color:var(--text-muted);cursor:pointer;
  transition:all var(--transition);
}
#clear-memory-btn:hover{background:var(--error-bg);border-color:var(--error-border);color:#f87171}
#memory-list{max-height:140px;overflow-y:auto;padding:0 2px}
.memory-item{
  font-size:11.5px;color:var(--text-dim);padding:5px 8px;
  border-radius:5px;border-left:2px solid var(--accent);
  background:var(--surface2);margin-bottom:4px;
  overflow:hidden;display:-webkit-box;
  -webkit-line-clamp:2;-webkit-box-orient:vertical;
}

/* ── Main chat area ─────────────────────────────────────────────── */
#chat-main{
  flex:1;display:flex;flex-direction:column;overflow:hidden;
  position:relative;
}

/* Header */
#chat-header{
  padding:14px 20px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
  background:var(--bg);
  flex-shrink:0;
}
#toggle-sidebar{
  background:none;border:none;color:var(--text-muted);
  cursor:pointer;padding:4px;border-radius:6px;
  transition:color var(--transition),background var(--transition);
  display:flex;align-items:center;justify-content:center;
}
#toggle-sidebar:hover{color:var(--text);background:var(--surface2)}
#chat-title{font-weight:600;font-size:15px;flex:1}
#model-badge{
  font-size:11px;padding:3px 10px;border-radius:20px;
  background:var(--surface2);border:1px solid var(--border2);
  color:var(--text-dim);display:flex;align-items:center;gap:5px;
}
.status-dot{
  width:6px;height:6px;border-radius:50%;
  background:#4ade80;flex-shrink:0;
  box-shadow:0 0 6px #4ade80;
}
.status-dot.thinking{background:var(--accent);box-shadow:0 0 6px var(--accent);animation:pulse 1.2s infinite}

/* Messages */
#messages{
  flex:1;overflow-y:auto;
  padding:24px 20px;
  display:flex;flex-direction:column;gap:20px;
  scroll-behavior:smooth;
}
#messages::-webkit-scrollbar{width:4px}
#messages::-webkit-scrollbar-track{background:transparent}
#messages::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px}

/* Empty state */
#empty-state{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;
  padding:40px;text-align:center;
  color:var(--text-muted);
}
.empty-icon{
  width:64px;height:64px;border-radius:20px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-size:28px;
  box-shadow:0 4px 24px var(--accent-glow);
  margin-bottom:4px;
}
.empty-title{font-size:18px;font-weight:600;color:var(--text);margin-bottom:4px}
.empty-subtitle{font-size:13px;line-height:1.7;max-width:360px}
.suggestion-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px}
.chip{
  padding:7px 14px;border-radius:20px;font-size:12.5px;
  background:var(--surface2);border:1px solid var(--border2);
  color:var(--text-dim);cursor:pointer;
  transition:all var(--transition);
}
.chip:hover{background:var(--surface3);border-color:var(--accent);color:var(--text)}

/* Message rows */
.msg-row{display:flex;gap:12px;align-items:flex-start}
.msg-row.user{flex-direction:row-reverse}

.avatar{
  width:32px;height:32px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;margin-top:2px;
}
.avatar.ai{background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 2px 10px var(--accent-glow)}
.avatar.user{background:var(--surface3);border:1px solid var(--border2)}

.msg-content{max-width:680px;min-width:0}
.msg-row.user .msg-content{align-items:flex-end;display:flex;flex-direction:column}

/* User bubble */
.user-bubble{
  padding:11px 16px;border-radius:16px 4px 16px 16px;
  background:var(--user-bg);
  border:1px solid var(--user-border);
  color:var(--user-text);font-size:14px;line-height:1.65;
  word-break:break-word;
}

/* AI message card */
.ai-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:4px 16px 16px 16px;
  overflow:hidden;
  width:100%;
}
.ai-card-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px}

/* Thought block */
.thought-block{
  font-size:12.5px;color:var(--text-muted);
  border-left:2px solid var(--thought-border);
  padding:4px 0 4px 10px;
  font-style:italic;line-height:1.6;
}
.thought-label{
  font-size:10.5px;font-weight:600;letter-spacing:.05em;
  text-transform:uppercase;color:var(--text-muted);opacity:.7;
  margin-bottom:2px;font-style:normal;
}

/* Tool call card */
.tool-card{
  background:var(--tool-bg);
  border:1px solid var(--tool-border);
  border-radius:var(--radius-sm);
  overflow:hidden;
}
.tool-header{
  padding:7px 12px;
  display:flex;align-items:center;gap:8px;
  cursor:pointer;
  user-select:none;
}
.tool-name{
  font-size:12px;font-weight:600;color:var(--tool-text);
  font-family:'JetBrains Mono',monospace;
}
.tool-input-preview{
  font-size:12px;color:var(--text-muted);overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;flex:1;
  font-family:'JetBrains Mono',monospace;
}
.tool-toggle{
  font-size:10px;color:var(--text-muted);margin-left:auto;
  flex-shrink:0;transition:transform var(--transition);
}
.tool-toggle.open{transform:rotate(180deg)}
.tool-result{
  padding:8px 12px 10px;
  border-top:1px solid var(--tool-border);
  font-size:12px;color:var(--text-dim);
  font-family:'JetBrains Mono',monospace;
  white-space:pre-wrap;word-break:break-all;
  max-height:200px;overflow-y:auto;
  display:none;
  line-height:1.55;
  background:var(--result-bg);
}
.tool-result.visible{display:block}

/* Final answer */
.answer-text{
  font-size:14px;line-height:1.75;color:var(--text);
  word-break:break-word;
}
.answer-text h1,.answer-text h2,.answer-text h3{
  font-weight:600;margin:14px 0 6px;color:var(--text);
}
.answer-text h1{font-size:18px}
.answer-text h2{font-size:16px}
.answer-text h3{font-size:14px}
.answer-text p{margin-bottom:10px}
.answer-text p:last-child{margin-bottom:0}
.answer-text ul,.answer-text ol{padding-left:20px;margin-bottom:10px}
.answer-text li{margin-bottom:4px}
.answer-text code{
  background:var(--surface3);padding:1px 5px;border-radius:4px;
  font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#c4b5fd;
}
.answer-text pre{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:12px 14px;
  overflow-x:auto;margin:10px 0;
}
.answer-text pre code{
  background:none;padding:0;font-size:12.5px;color:#e2e8f0;
}
.answer-text strong{font-weight:600;color:var(--text)}
.answer-text a{color:var(--accent);text-decoration:none}
.answer-text a:hover{text-decoration:underline}
.answer-text blockquote{
  border-left:3px solid var(--accent);padding-left:12px;
  color:var(--text-dim);margin:8px 0;font-style:italic;
}
.answer-text table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px}
.answer-text th{background:var(--surface2);padding:7px 12px;text-align:left;border-bottom:2px solid var(--border2)}
.answer-text td{padding:6px 12px;border-bottom:1px solid var(--border)}
.answer-text hr{border:none;border-top:1px solid var(--border);margin:12px 0}

/* Typing indicator */
.typing-indicator{display:flex;gap:5px;align-items:center;padding:4px 0}
.typing-indicator span{
  width:7px;height:7px;border-radius:50%;background:var(--accent);
  animation:bounce .9s infinite;opacity:.7;
}
.typing-indicator span:nth-child(2){animation-delay:.15s}
.typing-indicator span:nth-child(3){animation-delay:.3s}

/* Timestamp */
.msg-time{font-size:10.5px;color:var(--text-muted);margin-top:5px;padding:0 2px}

/* ── Input area ─────────────────────────────────────────────────── */
#input-area{
  padding:14px 20px 16px;
  border-top:1px solid var(--border);
  background:var(--bg);
  flex-shrink:0;
}
#input-wrapper{
  display:flex;gap:10px;align-items:flex-end;
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:14px;
  padding:10px 12px 10px 16px;
  transition:border-color var(--transition),box-shadow var(--transition);
}
#input-wrapper:focus-within{
  border-color:rgba(124,108,245,.5);
  box-shadow:0 0 0 3px rgba(124,108,245,.08);
}
#input{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-size:14px;font-family:'Inter',sans-serif;
  line-height:1.6;resize:none;min-height:22px;max-height:160px;
  overflow-y:auto;
}
#input::placeholder{color:var(--text-muted)}
#send-btn{
  width:36px;height:36px;border-radius:9px;border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;cursor:pointer;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;
  transition:background .18s ease,opacity var(--transition),transform var(--transition);
  box-shadow:0 2px 10px var(--accent-glow);
}
#send-btn:hover:not(:disabled){transform:scale(1.06)}
#send-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
#send-btn.stop-mode{
  background:linear-gradient(135deg,#e53e3e,#c53030);
  box-shadow:0 2px 10px rgba(229,62,62,.35);
  opacity:1 !important;cursor:pointer !important;
}
#input-hint{
  font-size:11px;color:var(--text-muted);margin-top:7px;
  padding:0 4px;display:flex;justify-content:space-between;
}

/* ── Scrollbars ─────────────────────────────────────────────────── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px}

/* ── Animations ─────────────────────────────────────────────────── */
@keyframes bounce{
  0%,80%,100%{transform:translateY(0)}
  40%{transform:translateY(-6px)}
}
@keyframes pulse{
  0%,100%{opacity:1}50%{opacity:.4}
}
@keyframes fadeSlideIn{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}
.msg-row{animation:fadeSlideIn .22s ease}

/* ── Toast ──────────────────────────────────────────────────────── */
#toast{
  position:fixed;bottom:20px;right:20px;
  background:var(--surface3);border:1px solid var(--border2);
  padding:10px 16px;border-radius:var(--radius-sm);
  font-size:13px;color:var(--text);
  transform:translateY(60px);opacity:0;
  transition:all .25s ease;z-index:100;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
}
#toast.show{transform:translateY(0);opacity:1}
</style>
</head>
<body>
<div id="app">

  <!-- ── Sidebar ──────────────────────────────────────────────── -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="logo-mark">🤖</div>
      <div>
        <div class="logo-text">Local LLM</div>
        <div class="logo-sub">Qwen3.5 · mlx-lm</div>
      </div>
    </div>

    <button id="new-chat-btn" onclick="newChat()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Chat
    </button>

    <div class="sidebar-section-label">History</div>
    <div id="chat-list"></div>

    <div class="memory-panel">
      <div class="memory-header">
        <div class="memory-title">
          🧠 Memory
          <span class="memory-count" id="memory-count">0</span>
        </div>
        <button id="clear-memory-btn" onclick="clearMemory()">Clear</button>
      </div>
      <div id="memory-list"></div>
    </div>
  </aside>

  <!-- ── Main ─────────────────────────────────────────────────── -->
  <main id="chat-main">
    <div id="chat-header">
      <button id="toggle-sidebar" onclick="toggleSidebar()" title="Toggle sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/>
        </svg>
      </button>
      <span id="chat-title">Chat</span>
      <button id="theme-btn" onclick="toggleTheme()" title="Toggle light/dark mode">🌙</button>
      <div id="model-badge">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Ready</span>
      </div>
    </div>

    <div id="messages">
      <div id="empty-state">
        <div class="empty-icon">✨</div>
        <div class="empty-title">What can I help you with?</div>
        <div class="empty-subtitle">I can search the web, read files, recall memories, and reason through complex tasks.</div>
        <div class="suggestion-chips">
          <div class="chip" onclick="useSuggestion('Search for the latest news about Apple Silicon M4')">🔍 Apple Silicon M4 news</div>
          <div class="chip" onclick="useSuggestion('List the files in my Desktop folder')">📁 List Desktop files</div>
          <div class="chip" onclick="useSuggestion('What do you remember from our previous conversations?')">🧠 Check memory</div>
          <div class="chip" onclick="useSuggestion('Explain how LangGraph works in simple terms')">💬 Explain LangGraph</div>
        </div>
      </div>
    </div>

    <div id="input-area">
      <div id="input-wrapper">
        <textarea id="input" rows="1" placeholder="Message the agent… (Enter to send, Shift+Enter for newline)"></textarea>
        <button id="send-btn" onclick="handleSendStop()" title="Send">
          <svg id="send-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
          <svg id="stop-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="display:none">
            <rect x="4" y="4" width="16" height="16" rx="2"/>
          </svg>
        </button>
      </div>
      <div id="input-hint">
        <span>Enter to send · Shift+Enter for newline</span>
        <span id="char-count"></span>
      </div>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────
let sessions = [];
let currentSessionId = null;
let isLoading = false;
let sidebarOpen = true;

// ── Theme ──────────────────────────────────────────────────────────
function toggleTheme() {
  const isLight = document.documentElement.classList.toggle('light');
  document.getElementById('theme-btn').textContent = isLight ? '☀️' : '🌙';
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
}

function applyStoredTheme() {
  const stored = localStorage.getItem('theme');
  if (stored === 'light') {
    document.documentElement.classList.add('light');
    document.getElementById('theme-btn').textContent = '☀️';
  }
}

// ── Init ───────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  applyStoredTheme();
  newChat();
  loadMemory();
  autoResizeTextarea();

  const inp = document.getElementById('input');
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  inp.addEventListener('input', () => {
    autoResizeTextarea();
    const n = inp.value.length;
    document.getElementById('char-count').textContent = n > 50 ? `${n} chars` : '';
  });
});

marked.setOptions({ breaks: true, gfm: true });

// ── Session management ─────────────────────────────────────────────
function newChat() {
  const session = { id: Date.now(), title: 'New Chat', messageEls: [] };
  sessions.unshift(session);
  currentSessionId = session.id;
  clearMessages();
  renderSessions();
}

function renderSessions() {
  const list = document.getElementById('chat-list');
  list.innerHTML = sessions.map(s => `
    <div class="chat-item ${s.id === currentSessionId ? 'active' : ''}"
         onclick="switchSession(${s.id})">
      <span class="chat-item-icon">💬</span>
      <span class="chat-item-title">${escHtml(s.title)}</span>
    </div>
  `).join('');
}

function switchSession(id) {
  currentSessionId = id;
  renderSessions();
}

function clearMessages() {
  document.getElementById('messages').innerHTML = `
    <div id="empty-state">
      <div class="empty-icon">✨</div>
      <div class="empty-title">What can I help you with?</div>
      <div class="empty-subtitle">I can search the web, read files, recall memories, and reason through complex tasks.</div>
      <div class="suggestion-chips">
        <div class="chip" onclick="useSuggestion('Search for the latest news about Apple Silicon M4')">🔍 Apple Silicon M4 news</div>
        <div class="chip" onclick="useSuggestion('List the files in my Desktop folder')">📁 List Desktop files</div>
        <div class="chip" onclick="useSuggestion('What do you remember from our previous conversations?')">🧠 Check memory</div>
        <div class="chip" onclick="useSuggestion('Explain how LangGraph works in simple terms')">💬 Explain LangGraph</div>
      </div>
    </div>`;
  document.getElementById('chat-title').textContent = 'Chat';
}

function useSuggestion(text) {
  const inp = document.getElementById('input');
  inp.value = text;
  autoResizeTextarea();
  sendMessage();
}

// ── Sidebar ────────────────────────────────────────────────────────
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
}

// ── Send message ───────────────────────────────────────────────────
async function sendMessage() {
  const inp = document.getElementById('input');
  const text = inp.value.trim();
  if (!text || isLoading) return;

  inp.value = '';
  autoResizeTextarea();

  // Hide empty state
  const empty = document.getElementById('empty-state');
  if (empty) empty.remove();

  // Update session title from first message
  const sess = sessions.find(s => s.id === currentSessionId);
  if (sess && sess.title === 'New Chat') {
    sess.title = text.length > 36 ? text.slice(0, 36) + '…' : text;
    document.getElementById('chat-title').textContent = sess.title;
    renderSessions();
  }

  appendUserMessage(text);
  const aiEl = appendAiMessage();
  setLoading(true);

  try {
    const res = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, session_id: String(currentSessionId) }),
    });

    if (!res.ok) throw new Error(`Server error ${res.status}`);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          try { handleEvent(JSON.parse(line.slice(6)), aiEl); } catch {}
        }
      }
    }
  } catch (err) {
    appendError(aiEl, err.message);
  } finally {
    removeTypingIndicator(aiEl);
    setLoading(false);
    scrollToBottom();
  }
}

// ── Event handling ─────────────────────────────────────────────────
function handleEvent(ev, aiEl) {
  switch (ev.type) {
    case 'start':
      showTypingIndicator(aiEl);
      break;
    case 'thought':
      removeTypingIndicator(aiEl);
      appendThought(aiEl, ev.content);
      showTypingIndicator(aiEl);
      scrollToBottom();
      break;
    case 'tool_call':
      removeTypingIndicator(aiEl);
      appendToolCall(aiEl, ev);
      scrollToBottom();
      break;
    case 'tool_result':
      attachToolResult(aiEl, ev.name, ev.output);
      showTypingIndicator(aiEl);
      scrollToBottom();
      break;
    case 'answer':
      removeTypingIndicator(aiEl);
      appendAnswer(aiEl, ev.content);
      scrollToBottom();
      break;
    case 'done':
      removeTypingIndicator(aiEl);
      finalizeMessage(aiEl);
      scrollToBottom();
      loadMemory();
      break;
    case 'stopped':
      removeTypingIndicator(aiEl);
      appendStopped(aiEl);
      scrollToBottom();
      break;
    case 'error':
      removeTypingIndicator(aiEl);
      appendError(aiEl, ev.message);
      scrollToBottom();
      break;
  }
}

// ── DOM helpers ────────────────────────────────────────────────────
function appendUserMessage(text) {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `
    <div class="msg-content">
      <div class="user-bubble">${escHtml(text)}</div>
      <div class="msg-time">${timeNow()}</div>
    </div>
    <div class="avatar user">🧑</div>`;
  msgs.appendChild(row);
  scrollToBottom();
}

function appendAiMessage() {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row';
  row.innerHTML = `
    <div class="avatar ai">🤖</div>
    <div class="msg-content" style="width:100%;max-width:680px">
      <div class="ai-card">
        <div class="ai-card-body"></div>
      </div>
      <div class="msg-time">${timeNow()}</div>
    </div>`;
  msgs.appendChild(row);
  return row;
}

function getBody(aiEl) {
  return aiEl.querySelector('.ai-card-body');
}

function showTypingIndicator(aiEl) {
  const body = getBody(aiEl);
  if (!body.querySelector('.typing-indicator')) {
    const d = document.createElement('div');
    d.className = 'typing-indicator';
    d.innerHTML = '<span></span><span></span><span></span>';
    body.appendChild(d);
  }
}

function removeTypingIndicator(aiEl) {
  const t = aiEl.querySelector('.typing-indicator');
  if (t) t.remove();
}

function appendThought(aiEl, content) {
  const body = getBody(aiEl);
  const d = document.createElement('div');
  d.className = 'thought-block';
  d.innerHTML = `<div class="thought-label">💭 Thinking</div>${escHtml(content)}`;
  body.appendChild(d);
}

function appendToolCall(aiEl, ev) {
  const body = getBody(aiEl);
  const d = document.createElement('div');
  d.className = 'tool-card';
  d.dataset.toolName = ev.name;
  d.innerHTML = `
    <div class="tool-header" onclick="toggleTool(this)">
      <span>${ev.icon || '🔧'}</span>
      <span class="tool-name">${escHtml(ev.name)}</span>
      <span class="tool-input-preview">"${escHtml((ev.input||'').slice(0,80))}"</span>
      <span class="tool-toggle">▼</span>
    </div>
    <div class="tool-result"><em>Waiting for result…</em></div>`;
  body.appendChild(d);
}

function attachToolResult(aiEl, name, output) {
  const cards = aiEl.querySelectorAll('.tool-card');
  for (let i = cards.length - 1; i >= 0; i--) {
    if (cards[i].dataset.toolName === name) {
      const res = cards[i].querySelector('.tool-result');
      res.textContent = output;
      res.classList.add('visible');
      const tog = cards[i].querySelector('.tool-toggle');
      if (tog) tog.classList.add('open');
      break;
    }
  }
}

function appendAnswer(aiEl, content) {
  const body = getBody(aiEl);
  const d = document.createElement('div');
  d.className = 'answer-text';
  d.innerHTML = marked.parse(content);
  body.appendChild(d);
}

function appendStopped(aiEl) {
  const body = getBody(aiEl);
  const d = document.createElement('div');
  d.style.cssText = 'font-size:12.5px;color:var(--text-muted);padding:4px 2px;font-style:italic';
  d.textContent = '⏹ Generation stopped.';
  body.appendChild(d);
}

function appendError(aiEl, msg) {
  const body = getBody(aiEl);
  const d = document.createElement('div');
  d.style.cssText = 'background:var(--error-bg);border:1px solid var(--error-border);border-radius:8px;padding:10px 14px;font-size:13px;color:#f87171';
  d.textContent = '⚠️ Error: ' + msg;
  body.appendChild(d);
}

function finalizeMessage(aiEl) {
  // Close all open tool results to save space (they stay expandable)
}

// ── Tool toggle ────────────────────────────────────────────────────
function toggleTool(header) {
  const result = header.nextElementSibling;
  const tog = header.querySelector('.tool-toggle');
  result.classList.toggle('visible');
  tog.classList.toggle('open');
}

// ── Stop generation ────────────────────────────────────────────────
function handleSendStop() {
  if (isLoading) {
    stopGeneration();
  } else {
    sendMessage();
  }
}

async function stopGeneration() {
  try {
    await fetch('/api/chat/stop', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: String(currentSessionId) }),
    });
  } catch {}
}

// ── Status ─────────────────────────────────────────────────────────
function setLoading(v) {
  isLoading = v;
  const btn  = document.getElementById('send-btn');
  const send = document.getElementById('send-icon');
  const stop = document.getElementById('stop-icon');
  document.getElementById('input').disabled = v;
  if (v) {
    btn.classList.add('stop-mode');
    btn.disabled = false;
    btn.title = 'Stop generation';
    send.style.display = 'none';
    stop.style.display = 'block';
    document.getElementById('status-dot').classList.add('thinking');
    document.getElementById('status-text').textContent = 'Thinking…';
  } else {
    btn.classList.remove('stop-mode');
    btn.disabled = false;
    btn.title = 'Send';
    send.style.display = 'block';
    stop.style.display = 'none';
    document.getElementById('status-dot').classList.remove('thinking');
    document.getElementById('status-text').textContent = 'Ready';
    document.getElementById('input').focus();
  }
}

// ── Memory ─────────────────────────────────────────────────────────
async function loadMemory() {
  try {
    const r = await fetch('/api/memory');
    const data = await r.json();
    document.getElementById('memory-count').textContent = data.count;
    const list = document.getElementById('memory-list');
    if (!data.items.length) {
      list.innerHTML = '<div style="font-size:11.5px;color:var(--text-muted);padding:4px 8px">No memories yet.</div>';
      return;
    }
    list.innerHTML = data.items.slice(-8).reverse().map(item => `
      <div class="memory-item">${escHtml(item.text.slice(0, 120))}</div>
    `).join('');
  } catch {}
}

async function clearMemory() {
  if (!confirm('Clear all memories?')) return;
  await fetch('/api/memory', { method: 'DELETE' });
  loadMemory();
  showToast('Memory cleared');
}

// ── Utils ──────────────────────────────────────────────────────────
function scrollToBottom() {
  const msgs = document.getElementById('messages');
  requestAnimationFrame(() => { msgs.scrollTop = msgs.scrollHeight; });
}

function autoResizeTextarea() {
  const ta = document.getElementById('input');
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 160) + 'px';
}

function timeNow() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
